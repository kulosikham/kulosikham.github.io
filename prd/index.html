<!DOCTYPE html>
<html lang="en">

<head>

    <title>netshop.id - Toko Online Digital</title>

<body>

    <!-- Header Section -->
    <header>
        <!-- Navbar -->
        <nav class="navbar navbar-expand-lg navbar-light bg-light">
            <div class="container">
                <!-- Navbar brand and logo -->
                <a class="navbar-brand" href="#">
                    <img src="assets/image/Desain tanpa judul (4).png" alt="NetShop.id Logo" class="logo">
                    netshop.id
                </a>
                <!-- Hamburger Menu -->
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                    aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <!-- Navbar links -->
                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav ms-auto">
                        <li class="nav-item">
                            <a class="nav-link" href="#">Home</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="p">Products</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="testimoni">Testimonial</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="discord">Contact</a>
                        </li>
                        <!-- More links here -->
                    </ul>
                </div>
            </div>
        </nav>
    </header>

    <!-- Product List -->
    <main class="container">
        <div class="row">
            <!-- Product 1 -->
            <div class="col-md-4">
                <div class="produk-card">
                    <img src="assets/product1.jpg" alt="Product 1" class="card-img-top">
                    <div class="card-body">
                        <h5 class="card-title">Product 1</h5>
                        <p class="card-text">Rp 18.000</p>
                        <p class="card-text">Total Terjual: 100</p>
                        <a href="#" class="btn btn-primary">Beli Sekarang</a>
                    </div>
                </div>
            </div>
            <!-- Product 2 -->
            <div class="col-md-4">
                <div class="produk-card">
                    <img src="assets/product2.jpg" alt="Product 2" class="card-img-top">
                    <div class="card-body">
                        <h5 class="card-title">Product 2</h5>
                        <p class="card-text">Rp 18.000</p>
                        <p class="card-text">Total Terjual: 80</p>
                        <a href="#" class="btn btn-primary">Beli Sekarang</a>
                    </div>
                </div>
            </div>
            <!-- Add more product cards here -->
        </div>
        <!-- Add more rows and products as needed -->

    <!-- Footer Section -->
    <footer class="bg-dark text-light text-center py-3">
        <p>&copy; 2023 NetShop.id. All rights reserved.</p>
