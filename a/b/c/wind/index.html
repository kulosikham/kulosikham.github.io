<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toko Online Digital</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>

<body class="bg-gray-100">
    <header class="bg-white shadow-lg">
        <div class="container mx-auto px-4">
            <div class="flex items-center justify-between py-4">
                <div>
                    <h1 class="text-xl font-semibold text-gray-800">Toko Online Digital</h1>
                </div>
                <div>
                    <a href="#" class="text-gray-600 hover:text-gray-800 px-3 py-2">Home</a>
                    <a href="#" class="text-gray-600 hover:text-gray-800 px-3 py-2">Products</a>
                    <a href="#" class="text-gray-600 hover:text-gray-800 px-3 py-2">Contact</a>
                </div>
            </div>
        </div>
    </header>

    <main class="container mx-auto px-4 py-6">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
            <!-- Product Card Example -->
            <div class="bg-white rounded-lg shadow-md overflow-hidden">
                <img src="https://via.placeholder.com/300" alt="Product" class="w-full h-48 object-cover">
                <div class="p-4">
                    <h2 class="text-lg font-semibold text-gray-800">Product Name</h2>
                    <p class="mt-2 text-gray-600">Description of the product goes here. This is a brief overview of
                        what
                        the product is.</p>
                    <div class="mt-4 flex justify-between items-center">
                        <span class="font-semibold text-xl text-gray-800">$99.00</span>
                        <button
                            class="px-4 py-2 bg-blue-500 text-white rounded hover:bg-blue-600 focus:outline-none">Add
                            to
                            Cart</button>
                    </div>
                </div>
            </div>

            <!-- You can repeat the above product card structure for more products -->

        </div>
    </main>

    <footer class="bg-gray-800 text-white py-4">
        <div class="container mx-auto px-4">
            <p class="text-center">&copy; 2024 Toko Online Digital. All rights reserved.</p>
        </div>
    </footer>
</body>

</html>
