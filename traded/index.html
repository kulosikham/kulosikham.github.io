<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulasi Trading</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>Simulasi Trading</h1>
        <button id="generateButton">Generate</button>
        <div id="simulationResult">
            <p>Harga Beli: <span id="buyPrice"></span></p>
            <p>Harga Jual: <span id="sellPrice"></span></p>
            <p>Keuntungan: <span id="profit"></span></p>
            <div class="progress-bar">
                <div id="buyBar" class="bar green"></div>
                <div id="sellBar" class="bar red"></div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
