<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Whack-a-Mole</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <style>
    .game-grid {
      display: grid;
      grid-template-columns: repeat(3, 100px);
      grid-gap: 10px;
      justify-content: center;
      margin: 20px auto;
    }
    .hole {
      width: 100px;
      height: 100px;
      background-color: #ccc;
      position: relative;
      overflow: hidden;
    }
    .mole {
      width: 80px;
      height: 80px;
      background-color: brown;
      border-radius: 50%;
      position: absolute;
      top: 110px;
      left: 10px;
      transition: top 0.3s ease;
    }
    .mole.show {
      top: 10px;
    }
  </style>
</head>
<body class="bg-green-200 flex flex-col items-center justify-center min-h-screen">
  <h1 class="text-3xl font-bold mb-6">Whack-a-Mole</h1>
  <div class="game-grid">
    <div class="hole" id="hole1"><div class="mole"></div></div>
    <div class="hole" id="hole2"><div class="mole"></div></div>
    <div class="hole" id="hole3"><div class="mole"></div></div>
    <div class="hole" id="hole4"><div class="mole"></div></div>
    <div class="hole" id="hole5"><div class="mole"></div></div>
    <div class="hole" id="hole6"><div class="mole"></div></div>
    <div class="hole" id="hole7"><div class="mole"></div></div>
    <div class="hole" id="hole8"><div class="mole"></div></div>
    <div class="hole" id="hole9"><div class="mole"></div></div>
  </div>
  <p class="text-xl">Skor: <span id="score">0</span></p>
  <p class="text-xl">Level: <span id="level">1</span></p>
  <p class="text-xl">Total Skor Negara: <span id="countryScore">0</span></p>
  <button id="startBtn" class="bg-blue-500 text-white py-2 px-4 rounded mt-4 hover:bg-blue-700">Mulai Permainan</button>
  <button id="stopBtn" class="bg-red-500 text-white py-2 px-4 rounded mt-4 hover:bg-red-700">Berhenti</button>

  <audio id="hitSound" src="https://www.soundjay.com/button/beep-07.wav"></audio>

  <script>
    let score = 0;
    let level = 1;
    let countryScore = localStorage.getItem('countryScore') || 0;
    let moleTimerId;

    const holes = document.querySelectorAll('.hole');
    const scoreDisplay = document.getElementById('score');
    const levelDisplay = document.getElementById('level');
    const countryScoreDisplay = document.getElementById('countryScore');
    const startBtn = document.getElementById('startBtn');
    const stopBtn = document.getElementById('stopBtn');
    const hitSound = document.getElementById('hitSound');

    countryScoreDisplay.textContent = countryScore;

    function randomHole(holes) {
      const index = Math.floor(Math.random() * holes.length);
      return holes[index];
    }

    function showMole() {
      const hole = randomHole(holes);
      const mole = hole.querySelector('.mole');
      mole.classList.add('show');

      setTimeout(() => {
        mole.classList.remove('show');
        if (startBtn.disabled) showMole();
      }, 800 / level);
    }

    function startGame() {
      score = 0;
      level = 1;
      scoreDisplay.textContent = score;
      levelDisplay.textContent = level;
      startBtn.disabled = true;
      stopBtn.disabled = false;
      showMole();
    }

    function stopGame() {
      startBtn.disabled = false;
      stopBtn.disabled = true;
      clearTimeout(moleTimerId);
      updateCountryScore();
      alert('Permainan berakhir! Skor Anda: ' + score);
    }

    function updateCountryScore() {
      countryScore = parseInt(countryScore) + score;
      localStorage.setItem('countryScore', countryScore);
      countryScoreDisplay.textContent = countryScore;
    }

    holes.forEach(hole => {
      hole.addEventListener('click', (event) => {
        if (event.target.classList.contains('mole')) {
          score++;
          scoreDisplay.textContent = score;
          event.target.classList.remove('show');
          hitSound.play();
          if (score % 75 === 0) {
            level += 0.65;
            levelDisplay.textContent = Math.floor(level);
          }
        }
      });
    });

    startBtn.addEventListener('click', startGame);
    stopBtn.addEventListener('click', stopGame);
  </script>
</body>
</html>
