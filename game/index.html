<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Lucu</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center h-screen">
    <div id="game" class="relative w-full h-full">
        <div id="box" class="w-16 h-16 bg-blue-500 absolute cursor-pointer"></div>
    </div>
    
    <script>
        const box = document.getElementById('box');
        const game = document.getElementById('game');
        let score = 0;

        box.addEventListener('click', () => {
            score++;
            moveBox();
            alert('Skor Anda: ' + score);
        });

        function moveBox() {
            const x = Math.floor(Math.random() * (game.clientWidth - box.clientWidth));
            const y = Math.floor(Math.random() * (game.clientHeight - box.clientHeight));
            box.style.left = `${x}px`;
            box.style.top = `${y}px`;
        }

        moveBox();
    </script>
</body>
</html>
