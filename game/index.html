<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Game</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-blue-50 flex items-center justify-center min-h-screen">
    <div class="bg-white shadow-lg rounded-lg p-8 max-w-sm w-full text-center">
        <h1 class="text-3xl font-bold text-blue-600 mb-6">Password Game</h1>
        <p class="text-lg text-gray-700 mb-4">Enter the correct password to win!</p>
        <input id="passwordInput" type="password" placeholder="Enter password" class="border border-blue-300 rounded-lg p-2 w-full mb-4 focus:outline-none focus:ring-2 focus:ring-blue-400">
        <button id="submitBtn" class="bg-blue-500 text-white py-2 px-4 rounded-lg hover:bg-blue-600 transition">Submit</button>
        <p id="message" class="text-red-500 mt-4"></p>
    </div>

    <script>
        document.getElementById('submitBtn').addEventListener('click', function() {
            const passwordInput = document.getElementById('passwordInput').value;
            const message = document.getElementById('message');

            if(passwordInput === 'funpassword') {
                message.textContent = 'Congratulations! You entered the correct password!';
                message.classList.remove('text-red-500');
                message.classList.add('text-green-500');
            } else {
                message.textContent = 'Oops! Wrong password, try again!';
                message.classList.remove('text-green-500');
                message.classList.add('text-red-500');
            }
        });
    </script>
</body>
</html>
