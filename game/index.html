<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Whack-a-Mole</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <style>
    .game-grid {
      display: grid;
      grid-template-columns: repeat(3, 100px);
      grid-gap: 10px;
      justify-content: center;
      margin: 20px auto;
    }
    .hole {
      width: 100px;
      height: 100px;
      background-color: #ccc;
      position: relative;
      overflow: hidden;
    }
    .mole {
      width: 80px;
      height: 80px;
      background-color: brown;
      border-radius: 50%;
      position: absolute;
      top: 110px;
      left: 10px;
      transition: top 0.3s ease;
    }
    .mole.show {
      top: 10px;
    }
  </style>
</head>
<body class="bg-green-200 flex flex-col items-center justify-center min-h-screen">
  <h1 class="text-3xl font-bold mb-6">Whack-a-Mole</h1>
  <div class="game-grid">
    <div class="hole" id="hole1"><div class="mole"></div></div>
    <div class="hole" id="hole2"><div class="mole"></div></div>
    <div class="hole" id="hole3"><div class="mole"></div></div>
    <div class="hole" id="hole4"><div class="mole"></div></div>
    <div class="hole" id="hole5"><div class="mole"></div></div>
    <div class="hole" id="hole6"><div class="mole"></div></div>
    <div class="hole" id="hole7"><div class="mole"></div></div>
    <div class="hole" id="hole8"><div class="mole"></div></div>
    <div class="hole" id="hole9"><div class="mole"></div></div>
  </div>
  <p class="text-xl">Skor: <span id="score">0</span></p>
  <p class="text-xl">Waktu: <span id="time">30</span> detik</p>
  <p class="text-xl">Rekor Skor Tertinggi: <span id="highScore">0</span></p>
  <button id="startBtn" class="bg-blue-500 text-white py-2 px-4 rounded mt-4 hover:bg-blue-700">Mulai Permainan</button>

  <audio id="hitSound" src="https://www.soundjay.com/button/beep-07.wav"></audio>

  <script>
    let score = 0;
    let timeLeft = 30;
    let timerId;
    let moleTimerId;
    let level = 1;
    let highScore = localStorage.getItem('highScore') || 0;

    const holes = document.querySelectorAll('.hole');
    const scoreDisplay = document.getElementById('score');
    const timeDisplay = document.getElementById('time');
    const highScoreDisplay = document.getElementById('highScore');
    const startBtn = document.getElementById('startBtn');
    const hitSound = document.getElementById('hitSound');

    highScoreDisplay.textContent = highScore;

    function randomHole(holes) {
      const index = Math.floor(Math.random() * holes.length);
      return holes[index];
    }

    function showMole() {
      const hole = randomHole(holes);
      const mole = hole.querySelector('.mole');
      mole.classList.add('show');

      setTimeout(() => {
        mole.classList.remove('show');
        if (timeLeft > 0) showMole();
      }, 800 / level);
    }

    function startGame() {
      score = 0;
      timeLeft = 30;
      level = 1;
      scoreDisplay.textContent = score;
      timeDisplay.textContent = timeLeft;
      startBtn.disabled = true;
      showMole();
      timerId = setInterval(countDown, 1000);
      moleTimerId = setInterval(() => {
        level++;
      }, 10000); // Increase level every 10 seconds
    }

    function countDown() {
      timeLeft--;
      timeDisplay.textContent = timeLeft;
      if (timeLeft <= 0) {
        clearInterval(timerId);
        clearInterval(moleTimerId);
        alert('Waktu habis! Skor Anda: ' + score);
        startBtn.disabled = false;
        if (score > highScore) {
          highScore = score;
          localStorage.setItem('highScore', highScore);
          highScoreDisplay.textContent = highScore;
        }
      }
    }

    holes.forEach(hole => {
      hole.addEventListener('click', (event) => {
        if (event.target.classList.contains('mole')) {
          score++;
          scoreDisplay.textContent = score;
          event.target.classList.remove('show');
          hitSound.play();
        }
      });
    });

    startBtn.addEventListener('click', startGame);
  </script>
</body>
</html>
