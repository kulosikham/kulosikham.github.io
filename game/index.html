<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Whack-a-Mole</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <style>
    .game-grid {
      display: grid;
      grid-template-columns: repeat(3, 100px);
      grid-gap: 10px;
      justify-content: center;
      margin: 20px auto;
    }
    .hole {
      width: 100px;
      height: 100px;
      background-color: #ccc;
      position: relative;
    }
    .mole {
      width: 80px;
      height: 80px;
      background-color: brown;
      border-radius: 50%;
      position: absolute;
      top: 10px;
      left: 10px;
      display: none;
    }
  </style>
</head>
<body class="bg-gray-100 flex flex-col items-center justify-center min-h-screen">
  <h1 class="text-3xl font-bold mb-6">Whack-a-Mole</h1>
  <div class="game-grid">
    <div class="hole" id="hole1"><div class="mole"></div></div>
    <div class="hole" id="hole2"><div class="mole"></div></div>
    <div class="hole" id="hole3"><div class="mole"></div></div>
    <div class="hole" id="hole4"><div class="mole"></div></div>
    <div class="hole" id="hole5"><div class="mole"></div></div>
    <div class="hole" id="hole6"><div class="mole"></div></div>
    <div class="hole" id="hole7"><div class="mole"></div></div>
    <div class="hole" id="hole8"><div class="mole"></div></div>
    <div class="hole" id="hole9"><div class="mole"></div></div>
  </div>
  <p class="text-xl">Skor: <span id="score">0</span></p>

  <script>
    let score = 0;
    const holes = document.querySelectorAll('.hole');
    const scoreDisplay = document.getElementById('score');

    function randomHole(holes) {
      const index = Math.floor(Math.random() * holes.length);
      return holes[index];
    }

    function showMole() {
      const hole = randomHole(holes);
      const mole = hole.querySelector('.mole');
      mole.style.display = 'block';
      
      setTimeout(() => {
        mole.style.display = 'none';
        showMole();
      }, 800);
    }

    holes.forEach(hole => {
      hole.addEventListener('click', (event) => {
        if (event.target.classList.contains('mole')) {
          score++;
          scoreDisplay.textContent = score;
          event.target.style.display = 'none';
        }
      });
    });

    showMole();
  </script>
</body>
</html>
